<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALHFRS — Live Facial Recognition Deployments, London</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #map {
      height: calc(100% - 64px);
      width: 100%;
    }

    /* ── Cluster icons ───────────────────────────────────── */
    .alhfrs-cluster {
      background: transparent !important;
      border: none !important;
    }

    .alhfrs-cluster-inner {
      background: #1a1a1a;
      border: 2px solid #e8e0d4;
      border-radius: 50%;
      color: #e8e0d4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ── Layer panel ─────────────────────────────────────── */
    #layer-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .layer-btn {
      background: rgba(13, 17, 35, 0.88);
      color: #9ba8c0;
      border: 1px solid #2a3a5e;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      text-align: left;
      min-width: 170px;
      letter-spacing: 0.02em;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      backdrop-filter: blur(4px);
    }

    .layer-btn:hover:not(:disabled) {
      background: rgba(42, 58, 94, 0.95);
      color: #d0d8ec;
    }

    .layer-btn.active {
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
      border-color: #e94560;
    }

    .layer-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .panel-section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3a4a68;
      padding: 4px 2px 1px;
    }

    /* ── Popups ──────────────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: #131b2e;
      border: 1px solid #2a3a5e;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      color: #c8d3e8;
    }

    .leaflet-popup-tip {
      background: #131b2e;
    }

    .lfr-popup {
      font-size: 12px;
      line-height: 1.5;
      min-width: 220px;
      max-width: 300px;
    }

    .popup-title {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f8;
      margin-bottom: 3px;
    }

    .popup-meta {
      font-size: 11px;
      color: #6b7fa8;
      margin-bottom: 6px;
      text-transform: capitalize;
    }

    .popup-purpose {
      color: #9ba8c0;
      margin-bottom: 5px;
    }

    .popup-stat {
      color: #9ba8c0;
      margin-bottom: 3px;
    }

    .popup-label {
      display: inline-block;
      color: #4a5a78;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 5px;
      min-width: 80px;
    }

    .popup-notes {
      font-size: 11px;
      color: #6b7fa8;
      margin-top: 6px;
      border-top: 1px solid #1e2d4a;
      padding-top: 6px;
      line-height: 1.45;
    }

    .popup-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #1e2d4a;
    }

    .popup-quality {
      font-size: 11px;
    }

    .popup-source {
      font-size: 11px;
      color: #4a7fa8;
      text-decoration: none;
    }

    .popup-source:hover {
      color: #6fa8d0;
      text-decoration: underline;
    }

    /* ── Legend ──────────────────────────────────────────── */
    .map-legend {
      background: rgba(13, 17, 35, 0.88);
      border: 1px solid #2a3a5e;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 11px;
      color: #9ba8c0;
      backdrop-filter: blur(4px);
      min-width: 130px;
    }

    .legend-title {
      color: #c8d3e8;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }

    .legend-note {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #1e2d4a;
      font-size: 10px;
      color: #3a4a68;
    }

    /* ── Borough tooltip ─────────────────────────────────── */
    .borough-tooltip {
      background: rgba(13, 17, 35, 0.85);
      border: 1px solid #2a3a5e;
      color: #9ba8c0;
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 3px;
      box-shadow: none;
    }

    /* ── Error banner ────────────────────────────────────── */
    #load-error {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
      background: #2a0a0a;
      border: 1px solid #e94560;
      color: #e94560;
      padding: 16px 20px;
      border-radius: 6px;
      font-size: 13px;
      max-width: 400px;
      text-align: center;
    }

    /* ── Timeline strip ──────────────────────────────────── */
    #timeline-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: #111;
      border-top: 1px solid #2a3a5e;
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      padding: 6px 20px 10px;
      gap: 4px;
    }

    .tl-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #3a4a68;
      align-self: center;
      margin-right: 8px;
      white-space: nowrap;
      user-select: none;
    }

    .tl-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      flex: 1;
      max-width: 60px;
      min-width: 28px;
      transition: opacity 0.15s;
    }

    .tl-col:hover .tl-bar {
      opacity: 0.75;
    }

    .tl-count {
      font-size: 9px;
      color: #6b7fa8;
      height: 11px;
      line-height: 11px;
      user-select: none;
    }

    .tl-bar {
      background: #c8392b;
      width: 100%;
      border-radius: 2px 2px 0 0;
      transition: background 0.2s, box-shadow 0.2s, opacity 0.15s;
      min-height: 2px;
    }

    .tl-year {
      font-size: 10px;
      color: #6b7fa8;
      font-weight: 500;
      user-select: none;
    }

    .tl-col.tl-active .tl-bar {
      background: #e94560;
      box-shadow: 0 0 8px rgba(233, 69, 96, 0.5);
    }

    .tl-col.tl-active .tl-year,
    .tl-col.tl-active .tl-count {
      color: #e94560;
    }

    /* ── Borough select ──────────────────────────────────── */
    #borough-select {
      background: rgba(13, 17, 35, 0.9);
      color: #9ba8c0;
      border: 1px solid #2a3a5e;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      outline: none;
      max-width: 180px;
    }

    #borough-select:hover {
      border-color: #4a5a88;
      color: #c8d3e8;
    }

    #borough-select option {
      background: #131b2e;
      color: #9ba8c0;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="layer-panel">
    <div class="panel-section-label">Police</div>
    <button class="layer-btn active" id="btn-boroughs">Borough boundaries</button>
    <button class="layer-btn active" id="btn-met">Met Police LFR</button>
    <button class="layer-btn active" id="btn-btp">BTP (stations)</button>
    <div class="panel-section-label">Private</div>
    <button class="layer-btn active" id="btn-private">Retail FRS (Facewatch)</button>
    <div class="panel-section-label">Coming soon</div>
    <button class="layer-btn" id="btn-news" disabled>News &amp; events</button>
    <button class="layer-btn" id="btn-community" disabled>Community</button>
  </div>

  <div id="timeline-strip"></div>
  <div id="load-error"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
