<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A London History of Facial Recognition Systems — Deployment Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── Shell ───────────────────────────────────────────── */
    #shell {
      display: flex;
      flex-direction: row;
      height: 100%;
      width: 100%;
    }

    /* ── Map pane ────────────────────────────────────────── */
    #map-pane {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      transition: flex-basis 0.35s ease;
    }

    #map {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 36px;
    }

    /* ── Title bar ───────────────────────────────────────── */
    #title-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: rgba(10, 13, 22, 0.96);
      border-top: 1px solid #1e2d4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }

    .title-bar-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #c8d3e8;
      text-transform: uppercase;
    }

    .title-bar-meta {
      font-size: 10px;
      color: #3a4a68;
      letter-spacing: 0.03em;
    }

    .title-bar-meta a {
      color: #4a6a98;
      text-decoration: none;
    }

    .title-bar-meta a:hover {
      color: #6fa8d0;
      text-decoration: underline;
    }

    /* ── Splat pane ──────────────────────────────────────── */
    #splat-pane {
      flex: 0 0 0;
      overflow: hidden;
      transition: flex-basis 0.35s ease;
      background: #080c14;
      border-left: 1px solid #1e2d4a;
      display: flex;
      flex-direction: column;
    }

    #splat-pane.open {
      flex: 0 0 400px;
    }

    #splat-header {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: #0d1117;
      border-bottom: 1px solid #1e2d4a;
      flex-shrink: 0;
    }

    .splat-header-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #9ba8c0;
      text-transform: uppercase;
    }

    .splat-header-sub {
      font-size: 10px;
      color: #3a4a68;
      margin-left: 8px;
    }

    #btn-close-splat {
      background: none;
      border: none;
      color: #3a4a68;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.15s;
    }

    #btn-close-splat:hover { color: #9ba8c0; }

    #splat-iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    /* ── Layer panel ─────────────────────────────────────── */
    #layer-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .layer-btn {
      background: rgba(13, 17, 35, 0.88);
      color: #9ba8c0;
      border: 1px solid #2a3a5e;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      text-align: left;
      min-width: 170px;
      letter-spacing: 0.02em;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      backdrop-filter: blur(4px);
    }

    .layer-btn:hover:not(:disabled) {
      background: rgba(42, 58, 94, 0.95);
      color: #d0d8ec;
    }

    .layer-btn.active {
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
      border-color: #e94560;
    }

    .layer-btn.splat-active {
      background: rgba(100, 160, 220, 0.12);
      color: #6fa8d0;
      border-color: #4a7fa8;
    }

    .layer-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .panel-section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3a4a68;
      padding: 4px 2px 1px;
    }

    /* ── Popups ──────────────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: #131b2e;
      border: 1px solid #2a3a5e;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      color: #c8d3e8;
    }

    .leaflet-popup-tip {
      background: #131b2e;
    }

    .lfr-popup {
      font-size: 12px;
      line-height: 1.5;
      min-width: 220px;
      max-width: 300px;
    }

    .popup-title {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f8;
      margin-bottom: 3px;
    }

    .popup-meta {
      font-size: 11px;
      color: #6b7fa8;
      margin-bottom: 6px;
      text-transform: capitalize;
    }

    .popup-purpose {
      color: #9ba8c0;
      margin-bottom: 5px;
    }

    .popup-stat {
      color: #9ba8c0;
      margin-bottom: 3px;
    }

    .popup-notes {
      font-size: 11px;
      color: #6b7fa8;
      margin-top: 6px;
      border-top: 1px solid #1e2d4a;
      padding-top: 6px;
      line-height: 1.45;
    }

    .popup-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #1e2d4a;
    }

    .popup-quality { font-size: 11px; }

    .popup-source {
      font-size: 11px;
      color: #4a7fa8;
      text-decoration: none;
    }

    .popup-source:hover {
      color: #6fa8d0;
      text-decoration: underline;
    }

    /* ── Legend ──────────────────────────────────────────── */
    .map-legend {
      background: rgba(13, 17, 35, 0.88);
      border: 1px solid #2a3a5e;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 11px;
      color: #9ba8c0;
      backdrop-filter: blur(4px);
      min-width: 130px;
      margin-bottom: 42px;
    }

    .legend-title {
      color: #c8d3e8;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }

    .legend-section {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #1e2d4a;
      font-size: 10px;
      color: #6b7fa8;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .legend-shape-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .legend-circle {
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: #4a5a78;
      flex-shrink: 0;
    }

    .legend-note {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #1e2d4a;
      font-size: 10px;
      color: #3a4a68;
    }

    /* ── Borough tooltip ─────────────────────────────────── */
    .borough-tooltip {
      background: rgba(13, 17, 35, 0.85);
      border: 1px solid #2a3a5e;
      color: #9ba8c0;
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 3px;
      box-shadow: none;
    }

    /* ── Error banner ────────────────────────────────────── */
    #load-error {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
      background: #2a0a0a;
      border: 1px solid #e94560;
      color: #e94560;
      padding: 16px 20px;
      border-radius: 6px;
      font-size: 13px;
      max-width: 400px;
      text-align: center;
    }

    /* ── Narrow screen: stack vertically ─────────────────── */
    @media (max-width: 600px) {
      #shell { flex-direction: column; }
      #splat-pane.open { flex: 0 0 320px; }
    }
  </style>
</head>

        "lat": 51.5188,
        "lon": -0.0680,
        "date_start": "2022-01-01",
        "date_end": null,
        "stated_purpose": "Theft and antisocial behaviour prevention",
        "outcome_arrests": null,
        "claimed_reduction": "See priv-001",
        "data_quality": "approximate",
        "source_url": "https://bigbrotherwatch.org.uk/press-releases/response-to-sainsburys-trial-of-live-facial-recognition-in-stores/",
        "notes": "Whitechapel has one of London's highest proportions of South Asian and Bangladeshi residents — demographic implications for FRS watchlist composition not disclosed."
      }
    ];

    // ── Config ────────────────────────────────────────────────────────────
    const QUALITY_COLORS = {
      confirmed:   '#e94560',
      approximate: '#f6a623',
      unverified:  '#8899aa',
    };

    const BOROUGH_STYLE = {
      color: '#2a3a5e',
      weight: 1,
      fillColor: 'transparent',
      fillOpacity: 0,
    };

    // ── Popup builder ─────────────────────────────────────────────────────
    function buildPopupHTML(d) {
      const dateStr = d.date_end && d.date_end !== d.date_start
        ? `${d.date_start} – ${d.date_end}`
        : d.date_start;

      const arrestsLine = d.outcome_arrests !== null
        ? `<div class="popup-stat">Arrests recorded: <strong>${d.outcome_arrests}</strong></div>`
        : '';

      const claimedLine = d.claimed_reduction
        ? `<div class="popup-stat">Claimed reduction: ${d.claimed_reduction}</div>`
        : '';

      const sourceLine = d.source_url
        ? `<a class="popup-source" href="${d.source_url}" target="_blank" rel="noopener">Source ↗</a>`
        : '';

      const qualityColor = QUALITY_COLORS[d.data_quality] ?? QUALITY_COLORS.unverified;
      const deployType = d.deployment_type ? ` · ${d.deployment_type}` : '';

      return `
        <div class="lfr-popup">
          <div class="popup-title">${d.location_name}</div>
          <div class="popup-meta">${d.borough} · ${dateStr}${deployType}</div>
          <div class="popup-purpose">${d.stated_purpose}</div>
          ${arrestsLine}${claimedLine}
          ${d.notes ? `<div class="popup-notes">${d.notes}</div>` : ''}
          <div class="popup-footer">
            <span class="popup-quality" style="color:${qualityColor}">● ${d.data_quality}</span>
            ${sourceLine}
          </div>
        </div>
      `;
    }

    // ── Deployment layer ──────────────────────────────────────────────────
    function createDeploymentLayer(deployments, radius) {
      const group = L.layerGroup();
      for (const d of deployments) {
        if (!d.lat || !d.lon) continue;
        const color = QUALITY_COLORS[d.data_quality] ?? QUALITY_COLORS.unverified;
        L.circleMarker([d.lat, d.lon], {
          radius: radius ?? 8,
          fillColor: color,
          color: '#fff',
          weight: 1.5,
          fillOpacity: 0.85,
        })
          .bindPopup(buildPopupHTML(d), { maxWidth: 340 })
          .addTo(group);
      }
      return group;
    }

    // ── Borough layer ─────────────────────────────────────────────────────
    function createBoroughLayer(geojsonData) {
      return L.geoJSON(geojsonData, {
        style: BOROUGH_STYLE,
        onEachFeature(feature, featureLayer) {
          featureLayer.bindTooltip(feature.properties.name, {
            sticky: true,
            className: 'borough-tooltip',
          });
        },
      });
    }

    // ── Legend ────────────────────────────────────────────────────────────
    function createLegend(map) {
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = () => {
        const div = L.DomUtil.create('div', 'map-legend');
        div.innerHTML = `
          <div class="legend-title">Data confidence</div>
          ${Object.entries(QUALITY_COLORS).map(([key, color]) => `
            <div class="legend-item">
              <span class="legend-dot" style="background:${color}"></span>
              <span>${key}</span>
            </div>
          `).join('')}
          <div class="legend-section">Operator</div>
          <div class="legend-shape-item">
            <span class="legend-circle" style="width:18px;height:18px;"></span>
            <span>Met Police</span>
          </div>
          <div class="legend-shape-item">
            <span class="legend-circle" style="width:16px;height:16px;"></span>
            <span>BTP (rail)</span>
          </div>
          <div class="legend-shape-item">
            <span class="legend-circle" style="width:14px;height:14px;"></span>
            <span>Retail FRS</span>
          </div>
          <div class="legend-note">ALHFRS · 15 deployments · May 2026</div>
        `;
        return div;
      };
      legend.addTo(map);
      return legend;
    }

    // ── Layer controls ────────────────────────────────────────────────────
    function initControls(map, layers) {
      function wire(btnId, layer) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        if (!layer) {
          btn.disabled = true;
          btn.title = 'Data not loaded';
          return;
        }
        let visible = true;
        btn.addEventListener('click', () => {
          visible = !visible;
          btn.classList.toggle('active', visible);
          visible ? layer.addTo(map) : map.removeLayer(layer);
        });
      }
      wire('btn-boroughs', layers.boroughs);
      wire('btn-met',      layers.met);
      wire('btn-btp',      layers.btp);
      wire('btn-private',  layers.private);
    }

    // ── Splat panel toggle ────────────────────────────────────────────────
    function initSplatPanel(map) {
      const splatPane  = document.getElementById('splat-pane');
      const btnSplat   = document.getElementById('btn-splat');
      const btnClose   = document.getElementById('btn-close-splat');
      const iframe     = document.getElementById('splat-iframe');
      let loaded = false;

      function open() {
        splatPane.classList.add('open');
        btnSplat.classList.add('splat-active');
        if (!loaded) {
          iframe.src = iframe.dataset.src;
          loaded = true;
        }
        setTimeout(() => map.invalidateSize(), 360);
      }

      function close() {
        splatPane.classList.remove('open');
        btnSplat.classList.remove('splat-active');
        setTimeout(() => map.invalidateSize(), 360);
      }

      btnSplat.addEventListener('click', () => {
        splatPane.classList.contains('open') ? close() : open();
      });
      btnClose.addEventListener('click', close);
    }

    // ── Init ──────────────────────────────────────────────────────────────
    async function init() {
      const map = L.map('map', {
        center: [51.509, -0.118],
        zoom: 11,
        zoomControl: true,
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        subdomains: 'abcd',
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      }).addTo(map);

      const metLayer     = createDeploymentLayer(MET_DATA, 9);
      const btpLayer     = createDeploymentLayer(BTP_DATA, 8);
      const privateLayer = createDeploymentLayer(PRIVATE_DATA, 7);

      metLayer.addTo(map);
      btpLayer.addTo(map);
      privateLayer.addTo(map);

      let boroughLayer = null;
      try {
        const res = await fetch('./map/data/london-boroughs.geojson');
        if (res.ok) {
          boroughLayer = createBoroughLayer(await res.json());
          boroughLayer.addTo(map);
        }
      } catch (_) { /* silent — button auto-disabled */ }

      createLegend(map);
      initControls(map, {
        boroughs: boroughLayer,
        met:      metLayer,
        btp:      btpLayer,
        private:  privateLayer,
      });
      initSplatPanel(map);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
